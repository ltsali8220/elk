<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ELK Lab{% endblock %}</title>
  <style>
    :root { --primary:#2563eb; --danger:#dc2626; --success:#16a34a; --bg:#f1f5f9; --card:#fff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:var(--bg); color:#1e293b; }
    nav { background:var(--primary); color:#fff; padding:.75rem 1.5rem; display:flex; align-items:center; gap:1rem; }
    nav a { color:#fff; text-decoration:none; font-size:.9rem; }
    nav .brand { font-weight:700; font-size:1.1rem; margin-right:auto; }
    .container { max-width:1100px; margin:2rem auto; padding:0 1rem; }
    .card { background:var(--card); border-radius:.5rem; box-shadow:0 1px 3px rgba(0,0,0,.1); padding:1.5rem; margin-bottom:1.5rem; }
    h1 { font-size:1.5rem; margin-bottom:1rem; }
    h2 { font-size:1.2rem; margin-bottom:.75rem; }
    .btn { display:inline-block; padding:.5rem 1.2rem; border-radius:.375rem; border:none; cursor:pointer; font-size:.9rem; text-decoration:none; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-danger  { background:var(--danger);  color:#fff; }
    .alert { padding:.75rem 1rem; border-radius:.375rem; margin-bottom:1rem; }
    .alert-danger  { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .alert-success { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    table { width:100%; border-collapse:collapse; font-size:.875rem; }
    th,td { text-align:left; padding:.5rem .75rem; border-bottom:1px solid #e2e8f0; }
    th { background:#f8fafc; font-weight:600; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:.875rem; font-weight:500; margin-bottom:.3rem; }
    input[type=text],input[type=email],input[type=password] {
      width:100%; padding:.5rem .75rem; border:1px solid #cbd5e1; border-radius:.375rem; font-size:.9rem; }
  </style>
</head>
<body>
<nav>
  <span class="brand">ELK Lab</span>
  {% if session.username %}
    <a href="/dashboard">Dashboard</a>
    <a href="/api/health">Health</a>
    <span style="margin-left:auto;font-size:.85rem">{{ session.username }} ({{ session.role }})</span>
    <a href="/logout" class="btn btn-danger" style="padding:.3rem .8rem">Logout</a>
  {% else %}
    <a href="/login">Login</a>
    <a href="/register">Register</a>
  {% endif %}
</nav>
<div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
